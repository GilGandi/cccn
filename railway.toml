[build]
builder = "nixpacks"
buildCommand = "npm install --legacy-peer-deps && npx prisma generate && npx next build"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20"]

[build.nixpacksPlan.variables]
NEXT_TELEMETRY_DISABLED = "1"
PRISMA_DISABLE_WARNINGS = "true"

[deploy]
startCommand = "bash scripts/migrate-safe.sh && npx next start -p $PORT"
restartPolicyType = "on_failure"
